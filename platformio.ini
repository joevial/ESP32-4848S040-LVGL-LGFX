[platformio]
boards_dir = ./board

[env:esp32-s3-devkitc-1]
platform = espressif32
board = esp32-s3-devkitc-1-n16r8v
framework = arduino
monitor_speed = 115200

build_flags =  
    -std=gnu++17
    -DBOARD_HAS_PSRAM
    -mfix-esp32-psram-cache-issue
    -DLV_CONF_INCLUDE_SIMPLE  
    ;-DARDUINO_USB_MODE=1
    ;-DARDUINO_USB_CDC_ON_BOOT=1
    -DCORE_DEBUG_LEVEL=3
    -DDISABLE_ALL_LIBRARY_WARNINGS
    -I src
    -I lib
    -I.pio/libdeps/stable

lib_deps = 
    lvgl/lvgl @ ^9.4.0
    lovyan03/LovyanGFX
    https://github.com/tamctec/gt911-arduino.git
	ArduinoOTA
	file://C:\Users\moeburn\Documents\Arduino\libraries\Blynk
    https://github.com/claws/BH1750.git